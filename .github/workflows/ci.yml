name: CI Pipeline Optimization

on: [push] # Chạy mỗi khi bạn push code lên

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven' # Kích hoạt tính năng caching

      - name: Build with Maven
        run: mvn package